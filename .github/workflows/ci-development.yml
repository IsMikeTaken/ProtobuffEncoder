name: CI — Development

on:
  push:
    branches: [develop, development]
    paths-ignore:
      - 'Writerside/**'
      - 'docs/**'
      - '*.md'

concurrency:
  group: dev-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_SOURCE: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

permissions:
  contents: read
  packages: write

jobs:

  # ── Build & Test ──────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet: ['8.0.x', '9.0.x', '10.0.x']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ matrix.dotnet }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: >-
          dotnet test --no-build --configuration Release
          --logger "trx;LogFileName=results-${{ matrix.dotnet }}.trx"
          --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.dotnet }}
          path: TestResults/*.trx
          retention-days: 7

  # ── Pack & Publish pre-release packages ───────────────────
  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack with dev version suffix
        run: |
          for project in src/*/*.csproj; do
            echo "Packing $project..."
            dotnet pack "$project" --configuration Release \
              -p:VersionSuffix="dev.${{ github.run_number }}" \
              --output ./nupkgs
          done

      - name: Push to GitHub Packages
        run: >-
          dotnet nuget push ./nupkgs/*.nupkg
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --source ${{ env.NUGET_SOURCE }}
          --skip-duplicate
