name: Build, Test, and Pack

on:
  workflow_call:
    inputs:
      version_suffix:
        required: false
        type: string
        default: ''
      push_to_nuget:
        required: false
        type: boolean
        default: false
      is_preview:
        required: false
        type: boolean
        default: false
    secrets:
      NUGET_API_KEY:
        required: false

jobs:
  build-test-pack:
    strategy:
      matrix:
        dotnet-version: [ '8.0.x', '9.0.x', '10.0.x' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: |
          # Convert '8.0.x' to 'net8.0'
          DOTNET_VER="${{ matrix.dotnet-version }}"
          FRAMEWORK_VER=${DOTNET_VER%.x}
          dotnet test --no-build --configuration Release --verbosity normal --framework "net$FRAMEWORK_VER"

      - name: Pack
        run: |
          VERSION_SUFFIX_ARG=""
          if [ -n "${{ inputs.version_suffix }}" ]; then
            VERSION_SUFFIX_ARG="--version-suffix ${{ inputs.version_suffix }}"
          fi
          for project in src/*/*.csproj; do
            echo "Packing $project..."
            dotnet pack "$project" --no-build --configuration Release $VERSION_SUFFIX_ARG --output ./artifacts
          done

      - name: Push to NuGet
        if: ${{ inputs.push_to_nuget && secrets.NUGET_API_KEY != '' }}
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
