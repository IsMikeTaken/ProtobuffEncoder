name: CI — Pull Request

on:
  pull_request:
    branches: [master, develop]
    paths-ignore:
      - 'Writerside/**'
      - 'docs/**'
      - '*.md'

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_SOURCE: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

jobs:

  # ── Build & Test each target framework ────────────────────
  build:
    name: test / ${{ matrix.framework }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - framework: net8.0
            label: '.NET 8'
          - framework: net9.0
            label: '.NET 9'
          - framework: net10.0
            label: '.NET 10'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build (all targets)
        run: dotnet build --no-restore --configuration Release

      - name: Test — ${{ matrix.label }}
        run: >-
          dotnet test --no-build --configuration Release
          --framework ${{ matrix.framework }}
          --logger "trx;LogFileName=results-${{ matrix.framework }}.trx"
          --results-directory ./TestResults

      - name: Verify test results exist
        if: always()
        run: |
          echo "── Test result files ──"
          find ./TestResults -name '*.trx' -exec echo "  ✓ {}" \; 2>/dev/null
          COUNT=$(find ./TestResults -name '*.trx' 2>/dev/null | wc -l)
          echo "Found $COUNT result file(s)"
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No test results produced for ${{ matrix.framework }} — tests may have been skipped entirely"
            exit 1
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.framework }}
          path: TestResults/*.trx
          retention-days: 7

  # ── Pack preview NuGet packages ───────────────────────────
  pack:
    name: pack / preview
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Pack with PR version suffix
        run: |
          for project in src/*/*.csproj; do
            echo "Packing $project..."
            dotnet pack "$project" --configuration Release \
              -p:VersionSuffix="pr.${{ github.event.pull_request.number }}.${{ github.run_number }}" \
              --output ./nupkgs
          done

      - name: List packages
        run: ls -lh ./nupkgs/*.nupkg

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs-pr
          path: ./nupkgs/*.nupkg
          retention-days: 7
