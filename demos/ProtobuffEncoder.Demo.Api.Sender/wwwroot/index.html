<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protobuf Sender Dashboard</title>
  <style>
    :root { --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a; --accent: #6c5ce7; --green: #00b894; --red: #e17055; --yellow: #fdcb6e; --text: #dfe6e9; --muted: #636e72; --blue: #74b9ff; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header .sub { font-size: 12px; color: var(--muted); }
    .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .panel-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .panel-header h2 { font-size: 14px; font-weight: 600; }
    .panel-body { padding: 18px; }
    .form-row { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; }
    .form-row label { font-size: 12px; color: var(--muted); min-width: 80px; }
    input, select, textarea { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 13px; outline: none; flex: 1; }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 60px; font-family: inherit; }
    button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 500; transition: all 0.2s; width: 100%; margin-top: 8px; }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .flow { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-top: 12px; }
    .flow-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .flow-step { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 12px; }
    .flow-step .arrow { color: var(--accent); font-weight: bold; }
    .flow-step .label { color: var(--muted); min-width: 70px; }
    .flow-step .value { color: var(--text); word-break: break-all; }
    .flow-step.active { color: var(--green); }
    .flow-step.error { color: var(--red); }
    .result-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; grid-column: 1 / -1; }
    .result-body { padding: 18px; max-height: 400px; overflow-y: auto; }
    .result-entry { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 10px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .result-entry h4 { font-size: 13px; margin-bottom: 8px; color: var(--blue); display: flex; justify-content: space-between; }
    .result-entry h4 .time { color: var(--muted); font-weight: normal; font-size: 11px; }
    .result-entry pre { font-size: 12px; color: var(--text); white-space: pre-wrap; line-height: 1.6; }
    .result-entry .badge { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; }
    .badge.ok { background: rgba(0,184,148,0.15); color: var(--green); }
    .badge.fail { background: rgba(225,112,85,0.15); color: var(--red); }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top: 2px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .forecast-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; border-bottom: 1px solid var(--border); }
    .forecast-row:last-child { border-bottom: none; }
    .tag { display: inline-block; font-size: 10px; padding: 1px 6px; background: rgba(116,185,255,0.15); color: var(--blue); border-radius: 4px; margin-right: 4px; }
    @media (max-width: 768px) { .container { grid-template-columns: 1fr; } .result-panel { grid-column: 1; } }
  </style>
</head>
<body>
  <div class="header">
    <h1>Protobuf Sender Dashboard</h1>
    <span class="sub">Sender (:5200) &rarr; Protobuf &rarr; Receiver (:5100) &rarr; Protobuf &rarr; Sender &rarr; JSON</span>
  </div>

  <div class="container">
    <!-- Weather Request -->
    <div class="panel">
      <div class="panel-header"><h2>Weather Request</h2></div>
      <div class="panel-body">
        <div class="form-row"><label>City</label><input type="text" id="wCity" value="Amsterdam"></div>
        <div class="form-row"><label>Days</label><input type="number" id="wDays" value="3" min="1" max="14"></div>
        <div class="form-row"><label>Hourly Wind</label><input type="checkbox" id="wHourly" style="flex:0;width:auto"></div>
        <button onclick="sendWeather()" id="btnWeather">Send Weather Request</button>
        <div class="flow" id="weatherFlow" style="display:none">
          <div class="flow-title">Message Flow</div>
          <div id="weatherSteps"></div>
        </div>
      </div>
    </div>

    <!-- Notification Request -->
    <div class="panel">
      <div class="panel-header"><h2>Notification</h2></div>
      <div class="panel-body">
        <div class="form-row"><label>Source</label><input type="text" id="nSource" value="Dashboard"></div>
        <div class="form-row"><label>Text</label><textarea id="nText">Hello from the dashboard!</textarea></div>
        <div class="form-row"><label>Level</label><select id="nLevel"><option>Info</option><option>Warning</option><option>Error</option></select></div>
        <div class="form-row"><label>Tags</label><input type="text" id="nTags" value="dashboard, test" placeholder="comma-separated"></div>
        <button onclick="sendNotification()" id="btnNotif">Send Notification</button>
        <div class="flow" id="notifFlow" style="display:none">
          <div class="flow-title">Message Flow</div>
          <div id="notifSteps"></div>
        </div>
      </div>
    </div>

    <!-- Results -->
    <div class="result-panel">
      <div class="panel-header"><h2>Results</h2><span id="resultCount" style="font-size:12px;color:var(--muted)">0 requests</span></div>
      <div class="result-body" id="results">
        <div style="color:var(--muted);text-align:center;padding:40px;font-size:13px;">Send a request to see results</div>
      </div>
    </div>
  </div>

<script>
let reqCount = 0;

async function sendWeather() {
  const city = document.getElementById('wCity').value || 'Amsterdam';
  const days = document.getElementById('wDays').value || 3;
  const hourly = document.getElementById('wHourly').checked;
  const btn = document.getElementById('btnWeather');
  const flow = document.getElementById('weatherFlow');
  const steps = document.getElementById('weatherSteps');

  btn.disabled = true;
  flow.style.display = 'block';
  steps.innerHTML = step('Browser', 'JSON request', 'active');

  const url = `/api/send-weather?city=${encodeURIComponent(city)}&days=${days}&includeHourly=${hourly}`;

  try {
    steps.innerHTML += step('Sender', 'Encoding to protobuf...', 'active');
    const t0 = performance.now();
    const res = await fetch(url);
    const elapsed = Math.round(performance.now() - t0);

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    steps.innerHTML += step('Receiver', 'Schema-decoded, built response', 'active');
    steps.innerHTML += step('Sender', `Decoded response (${elapsed}ms round-trip)`, 'active');

    addWeatherResult(data, elapsed);
  } catch (e) {
    steps.innerHTML += step('Error', e.message, 'error');
    addErrorResult('Weather', e.message);
  } finally {
    btn.disabled = false;
  }
}

async function sendNotification() {
  const source = document.getElementById('nSource').value || 'Dashboard';
  const text = document.getElementById('nText').value || '';
  const level = document.getElementById('nLevel').value;
  const tags = document.getElementById('nTags').value.split(',').map(t => t.trim()).filter(Boolean);
  const btn = document.getElementById('btnNotif');
  const flow = document.getElementById('notifFlow');
  const steps = document.getElementById('notifSteps');

  btn.disabled = true;
  flow.style.display = 'block';
  steps.innerHTML = step('Browser', 'JSON notification', 'active');

  try {
    steps.innerHTML += step('Sender', 'Encoding to protobuf...', 'active');
    const t0 = performance.now();
    const res = await fetch('/api/send-notification', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source, text, level, tags })
    });
    const elapsed = Math.round(performance.now() - t0);

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    steps.innerHTML += step('Receiver', 'Schema-decoded notification', 'active');
    steps.innerHTML += step('Sender', `ACK received (${elapsed}ms)`, 'active');

    addNotifResult(data, elapsed);
  } catch (e) {
    steps.innerHTML += step('Error', e.message, 'error');
    addErrorResult('Notification', e.message);
  } finally {
    btn.disabled = false;
  }
}

function step(label, text, cls) {
  return `<div class="flow-step ${cls}"><span class="arrow">&rarr;</span><span class="label">${label}</span><span class="value">${text}</span></div>`;
}

function addWeatherResult(data, elapsed) {
  const container = document.getElementById('results');
  if (container.querySelector('div[style]')) container.innerHTML = '';
  reqCount++;
  document.getElementById('resultCount').textContent = `${reqCount} requests`;

  let forecastHtml = '';
  if (data.forecasts) {
    data.forecasts.forEach(f => {
      const wind = f.windSpeed != null ? ` | Wind: ${f.windSpeed.toFixed(1)} km/h` : '';
      forecastHtml += `<div class="forecast-row"><span>${f.date}</span><span style="color:var(--yellow)">${f.temperatureMin.toFixed(1)} – ${f.temperatureMax.toFixed(1)}°C</span><span style="color:var(--muted)">${f.condition}</span><span>${f.humidityPercent}%${wind}</span></div>`;
    });
  }

  const div = document.createElement('div');
  div.className = 'result-entry';
  div.innerHTML = `<h4>Weather: ${data.city} <span class="badge ok">OK</span> <span class="time">${elapsed}ms &middot; ${new Date().toLocaleTimeString()}</span></h4>${forecastHtml}`;
  container.prepend(div);
}

function addNotifResult(data, elapsed) {
  const container = document.getElementById('results');
  if (container.querySelector('div[style]')) container.innerHTML = '';
  reqCount++;
  document.getElementById('resultCount').textContent = `${reqCount} requests`;

  const accepted = data.accepted ? '<span class="badge ok">Accepted</span>' : '<span class="badge fail">Rejected</span>';

  let tagsHtml = '';
  if (data.sentNotification?.tags?.length) {
    tagsHtml = data.sentNotification.tags.map(t => `<span class="tag">${t}</span>`).join('');
  }

  const div = document.createElement('div');
  div.className = 'result-entry';
  div.innerHTML = `<h4>Notification ${accepted} <span class="time">${elapsed}ms &middot; ${new Date().toLocaleTimeString()}</span></h4>
    <pre>Source: ${data.sentNotification?.source || ''}
Text: ${data.sentNotification?.text || ''}
Level: ${data.sentNotification?.level || 0}
MessageId: ${data.messageId || ''}</pre>
    <div>${tagsHtml}</div>`;
  container.prepend(div);
}

function addErrorResult(type, message) {
  const container = document.getElementById('results');
  if (container.querySelector('div[style]')) container.innerHTML = '';
  reqCount++;
  document.getElementById('resultCount').textContent = `${reqCount} requests`;

  const div = document.createElement('div');
  div.className = 'result-entry';
  div.innerHTML = `<h4>${type} <span class="badge fail">Error</span> <span class="time">${new Date().toLocaleTimeString()}</span></h4><pre style="color:var(--red)">${message}</pre>`;
  container.prepend(div);
}
</script>
</body>
</html>
